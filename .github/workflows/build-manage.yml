name: Build Manage App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "manage/**"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: manage

      - name: Build binary
        run: npm run build
        working-directory: manage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manage-app-${{ matrix.os }}
          path: manage/dist/manage-app*
