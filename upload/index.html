<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Art Post — Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- password gate -->
  <div class="gate" id="gate">
    <div class="gate-card">
      <h1 class="gate-title">Upload Access</h1>
      <p class="gate-sub">Enter the upload password to continue</p>
      <input id="gatePass" type="password" class="gate-input" placeholder="Upload password" autofocus />
      <button id="gateBtn" class="gate-btn">Unlock</button>
      <p id="gateError" class="gate-error"></p>
    </div>
  </div>

  <!-- main app (hidden until unlocked) -->
  <main class="app" id="app" style="display:none">
    <form id="post-form" class="panel">

      <section class="row">
        <label class="field-label">Section</label>
        <div class="toggle-group" role="radiogroup">
          <button type="button" class="toggle active" data-value="personal">Personal</button>
          <button type="button" class="toggle" data-value="professional">Professional</button>
          <input type="hidden" name="workType" id="workType" value="personal" />
        </div>
      </section>

      <section class="row">
        <label class="field-label">Dimension</label>
        <div class="toggle-group" role="radiogroup">
          <button type="button" class="toggle active" data-value="false">2D</button>
          <button type="button" class="toggle" data-value="true">3D</button>
          <input type="hidden" name="dimension" id="dimension" value="false" />
        </div>
      </section>

      <section class="row">
        <label for="title" class="field-label">Title</label>
        <input id="title" name="title" type="text" class="text-input" maxlength="120" />
      </section>

      <section class="row">
        <label for="description" class="field-label">Description</label>
        <textarea id="description" name="description" class="text-input textarea" rows="3"></textarea>
      </section>

      <section class="row">
        <label for="sourceLink" class="field-label">Artwork source link</label>
        <input id="sourceLink" name="sourceLink" type="url" class="text-input" />
      </section>

      <section class="row">
        <label for="carouselImages" class="field-label">Carousel image URLs</label>
        <textarea id="carouselImages" name="carouselImages" class="text-input textarea" rows="3" placeholder="One URL per line"></textarea>
      </section>

      <section class="row inline">
        <label class="field-label">Include embed in carousel</label>
        <label class="switch">
          <input type="checkbox" id="includeEmbed" name="includeEmbed" />
          <span class="slider"></span>
        </label>
      </section>

      <section class="row" id="embedRow">
        <label for="embedCode" class="field-label">Embed code</label>
        <textarea id="embedCode" name="embedCode" class="text-input textarea" rows="3"></textarea>
      </section>

      <hr class="divider" />

      <section class="row actions">
        <button type="button" id="generateBtn" class="primary-btn">Generate XML</button>
        <button type="button" id="commitBtn" class="primary-btn commit-btn" disabled>Commit to GitHub</button>
      </section>

      <div id="statusMsg" class="status-msg"></div>
    </form>

    <section class="panel preview">
      <header class="preview-header">
        <span>XML preview</span>
        <button type="button" id="downloadBtn" class="secondary-btn" disabled>Download</button>
      </header>
      <pre id="xmlOutput" class="code-block"></pre>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
