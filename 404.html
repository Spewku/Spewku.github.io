<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>spewku.com — 404</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="404/404-style.css" />
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <main class="scene">
    <header class="tag draggable">
      <span class="dot"></span>
      <span class="label">spewku.com</span>
      <span class="pill">404</span>
    </header>

    <section class="glass-card draggable">
      <div class="alert-header">
        <span class="alert-dot"></span>
        <div class="alert-text">
          <h1 class="error-code">404</h1>
          <p class="error-tagline">Something went very wrong</p>
        </div>
      </div>

      <div class="gif-wrap">
        <img
          src="https://media.tenor.com/mbygAZAPb9EAAAAi/jester-jester-and-queen.gif"
          alt="Jester and Queen"
          class="center-gif"
        />
      </div>

      <div class="title-wrap">
        <h2 class="slop-title">That page does not exist here</h2>
      </div>
    </section>

    <footer class="meta draggable">
      <span class="chip">error • 404</span>
      <span class="chip">lost in glass slop</span>
    </footer>
  </main>
  <script>
    (function () {
      const draggables = document.querySelectorAll('.draggable');

      draggables.forEach((el) => {
        let startX = 0;
        let startY = 0;
        let originTransform = '';
        let pointerId = null;

        const onMove = (event) => {
          if (pointerId === null || event.pointerId !== pointerId) return;
          const dx = (event.clientX - startX) / 2;
          const dy = (event.clientY - startY) / 2;
          el.style.transform =
            (originTransform && originTransform !== 'none'
              ? originTransform
              : '') + ` translate(${dx}px, ${dy}px)`;
        };

        const endDrag = (event) => {
          if (pointerId === null || event.pointerId !== pointerId) return;
          el.releasePointerCapture(pointerId);
          pointerId = null;
          el.classList.remove('dragging');
          el.removeEventListener('pointermove', onMove);
          el.removeEventListener('pointerup', endDrag);
          el.removeEventListener('pointercancel', endDrag);
        };

        el.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          pointerId = event.pointerId;
          startX = event.clientX;
          startY = event.clientY;
          originTransform = getComputedStyle(el).transform;
          el.setPointerCapture(pointerId);
          el.classList.add('dragging');
          el.addEventListener('pointermove', onMove);
          el.addEventListener('pointerup', endDrag);
          el.addEventListener('pointercancel', endDrag);
        });
      });
    })();
  </script>
</body>
</html>
